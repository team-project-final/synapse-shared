name: Build Elasticsearch (analysis-nori) → ECR

# 커스텀 ES(analysis-nori) 이미지를 ECR에 빌드·push 하는 전용 워크플로.
# gitops#174 EKS 경로 / 검색 P3. shared #53.
# 앱용 deploy-service.yml은 gitops dev 오버레이를 SHA로 bump 하는 가정이 있어
# 고정태그 인프라 이미지(ES)엔 부적합 → 별도 lightweight 워크플로(이슈 #53 option a).
# gitops statefulset image 교체는 gitops 측에서 별도 처리(이 이슈 close가 트리거).

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "ECR 이미지 태그(서술적·고정). 기본 nori-9.2.1"
        required: false
        type: string
        default: "nori-9.2.1"
  push:
    branches: [main]
    paths:
      - "docker/elasticsearch/**"
      - ".github/workflows/build-elasticsearch.yml"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-northeast-2
  ECR_REPO: synapse/elasticsearch
  DEFAULT_TAG: nori-9.2.1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: echo "value=${{ inputs.image_tag || env.DEFAULT_TAG }}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # NOTE: ECR 레포(synapse/elasticsearch)는 인프라 측에서 선생성하는 전제.
      # 배포 OIDC role(synapse-gha-deploy-role)은 push/pull(GetAuthorizationToken)만 보유하고
      # ecr:DescribeRepositories·CreateRepository 권한이 없음(실측, #53). 레포 미존재 시
      # admin/terraform으로 `aws ecr create-repository --repository-name synapse/elasticsearch
      # --image-tag-mutability MUTABLE --image-scanning-configuration scanOnPush=true` 선생성 후 재실행.

      - name: Build, verify plugin, push
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          IMAGE="${REGISTRY}/${ECR_REPO}:${TAG}"
          echo "Building $IMAGE"
          docker build -f docker/elasticsearch/Dockerfile -t "$IMAGE" docker/elasticsearch

          echo "== plugin 검증(analysis-nori) =="
          docker run --rm "$IMAGE" bin/elasticsearch-plugin list | tee plugins.txt
          grep -qx "analysis-nori" plugins.txt || { echo "::error::analysis-nori 미포함 — Dockerfile 확인"; exit 1; }

          docker push "$IMAGE"
          echo "pushed $IMAGE"

      # describe-images는 ecr:DescribeImages 권한 의존 → 배포 role엔 없을 수 있어 비차단.
      # 권위 DoD 검증(describe-images)은 admin 측에서 별도 수행(#53).
      - name: Verify pushed image (DoD, non-blocking)
        continue-on-error: true
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          aws ecr describe-images \
            --repository-name "$ECR_REPO" \
            --image-ids imageTag="$TAG" \
            --query 'imageDetails[0].{tags:imageTags,pushedAt:imagePushedAt,digest:imageDigest}' \
            --output table \
          || echo "::notice::describe-images skipped(권한). admin 측 DoD 검증으로 대체."
