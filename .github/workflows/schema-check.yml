name: Schema Compatibility Check

on:
  pull_request:
    paths:
      - 'src/main/avro/**/*.avsc'

permissions:
  contents: read

jobs:
  schema-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Generate Avro Java classes
        run: ./gradlew :generateAvroJava

      - name: Check schema compatibility (registry)
        if: env.SCHEMA_REGISTRY_URL != ''
        env:
          SCHEMA_REGISTRY_URL: ${{ secrets.SCHEMA_REGISTRY_URL }}
          SCHEMA_REGISTRY_USER: ${{ secrets.SCHEMA_REGISTRY_USER }}
          SCHEMA_REGISTRY_PASSWORD: ${{ secrets.SCHEMA_REGISTRY_PASSWORD }}
        run: ./gradlew testSchemasTask

      - name: Notice — local compile only
        if: env.SCHEMA_REGISTRY_URL == ''
        env:
          SCHEMA_REGISTRY_URL: ${{ secrets.SCHEMA_REGISTRY_URL }}
        run: |
          echo "::notice::SCHEMA_REGISTRY_URL is not set. Schema check ran in local compile-only mode. Set the secret to enable full compatibility verification."
