name: synapse-local

services:
  # ── Infrastructure ──────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: synapse-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-synapse}
      POSTGRES_USER: ${POSTGRES_USER:-synapse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-synapse_local_pw}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-synapse}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - synapse-net

  redis:
    image: redis:7-alpine
    container_name: synapse-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_local_pw}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_local_pw}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - synapse-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: synapse-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr"
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - synapse-net

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: synapse-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID:-1}
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - synapse-net

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.0
    container_name: synapse-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${SCHEMA_REGISTRY_PORT:-8086}:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: BACKWARD
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - synapse-net

  kafka-init:
    image: confluentinc/cp-kafka:7.7.0
    container_name: synapse-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Creating Kafka topics..."
        TOPICS=(
          "platform.auth.user-registered-v1"
          "knowledge.note.note-created-v1"
          "knowledge.note.note-updated-v1"
          "learning.card.review-completed-v1"
          "learning.ai.cards-generated-v1"
        )
        for topic in "$${TOPICS[@]}"; do
          echo "Creating topic: $$topic"
          kafka-topics --bootstrap-server kafka:29092 \
            --create --if-not-exists \
            --topic "$$topic" \
            --partitions 3 \
            --replication-factor 1 \
            --config retention.ms=604800000 \
            --config cleanup.policy=delete
        done
        echo "Topics created:"
        kafka-topics --bootstrap-server kafka:29092 --list
    networks:
      - synapse-net

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: synapse-opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms256m -Xmx256m
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - synapse-net

  # ── Gateway ──────────────────────────────────────

  gateway:
    image: eclipse-temurin:21-jre-alpine
    container_name: synapse-gateway
    entrypoint: ["sh", "-c", "echo 'gateway stub — replace with real Gateway image' && sleep infinity"]
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - synapse-net

  # ── Application Services (stub — replace with real images when ready) ──

  platform-svc:
    image: eclipse-temurin:21-jre-alpine
    container_name: synapse-platform-svc
    entrypoint: ["sh", "-c", "echo 'platform-svc stub running' && sleep infinity"]
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - synapse-net

  engagement-svc:
    image: eclipse-temurin:21-jre-alpine
    container_name: synapse-engagement-svc
    entrypoint: ["sh", "-c", "echo 'engagement-svc stub running' && sleep infinity"]
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - synapse-net

  knowledge-svc:
    image: eclipse-temurin:21-jre-alpine
    container_name: synapse-knowledge-svc
    entrypoint: ["sh", "-c", "echo 'knowledge-svc stub running' && sleep infinity"]
    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    networks:
      - synapse-net

  learning-card-svc:
    image: eclipse-temurin:21-jre-alpine
    container_name: synapse-learning-card-svc
    entrypoint: ["sh", "-c", "echo 'learning-card-svc stub running' && sleep infinity"]
    ports:
      - "8084:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - synapse-net

  learning-ai-svc:
    image: python:3.11-slim
    container_name: synapse-learning-ai-svc
    entrypoint: ["sh", "-c", "echo 'learning-ai-svc stub running' && sleep infinity"]
    ports:
      - "8090:8000"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - synapse-net

volumes:
  postgres-data:
  redis-data:
  opensearch-data:

networks:
  synapse-net:
    driver: bridge
